name: HS300 White-Horse Strategy Monthly Signal

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    # Every 1st-10th day of month at 20:00 UTC
    # Script internally checks if it's a trading day
    - cron: '0 20 1-10 * *'

jobs:
  baima-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install akshare numpy pandas yfinance

      - name: Run White-Horse Strategy
        env:
          PYTHONIOENCODING: utf-8
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/hs300_baima_strategy.py
